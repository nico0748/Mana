# ============================================================
# VPS ホスト上の Nginx 設定テンプレート
# 場所: /etc/nginx/sites-available/kuramori
#
# 前提: Certbot でSSL証明書を取得済み
#   sudo certbot certonly --nginx -d yourdomain.com
#
# 有効化:
#   sudo ln -s /etc/nginx/sites-available/kuramori /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Certbot の更新チャレンジ用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 本体
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name yourdomain.com;

    # Certbot が自動生成した証明書（パスはドメイン名に合わせて変更）
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Docker コンテナ（frontend Nginx）へプロキシ
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 画像アップロード等の大きなリクエスト対応
        client_max_body_size 60m;
        proxy_read_timeout   120s;
    }
}
